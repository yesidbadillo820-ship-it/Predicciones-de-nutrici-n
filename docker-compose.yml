# =============================================================
# NutriPredict Escolar — Entorno local con Docker Compose
# Uso:  docker compose up --build
#       Luego abre http://localhost:8080 (login: admin@nutripredict.edu.co / demo123)
# =============================================================
services:
  app:
    build: .
    ports:
      - "8080:80"
    environment:
      APP_ENV: development
      APP_DEBUG: "true"
      DB_HOST: db
      DB_PORT: "3306"
      DB_NAME: nutripredict_db
      DB_USER: nutripredict
      DB_PASS: nutripredict
      # ANTHROPIC_API_KEY: ""   # opcional: activa NutriBot con IA real
    depends_on:
      db:
        condition: service_healthy
    restart: unless-stopped

  db:
    image: mysql:8.0
    environment:
      MYSQL_ROOT_PASSWORD: root
      MYSQL_DATABASE: nutripredict_db
      MYSQL_USER: nutripredict
      MYSQL_PASSWORD: nutripredict
    ports:
      - "3306:3306"
    volumes:
      - db_data:/var/lib/mysql
      # Inicialización automática (orden alfabético): esquema y luego datos demo
      - ./database/schema.sql:/docker-entrypoint-initdb.d/01-schema.sql:ro
      - ./database/seed.sql:/docker-entrypoint-initdb.d/02-seed.sql:ro
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "127.0.0.1", "-proot"]
      interval: 10s
      timeout: 5s
      retries: 10
    restart: unless-stopped

volumes:
  db_data:
